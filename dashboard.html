<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaleed Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="dashboard-container">
        <h1 class="main-title">JALEED FLAVORS LIVE RATING</h1>
        
        <div class="flavors-row">
            <div class="flavor-card" id="raspberry">
                <div class="header-zone">
                    <h2>RASPBERRY & APPLE</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/APPLE-BERRY-CAN_ly0oev.png" alt="Raspberry & Apple" class="can-img">
                    <div class="smoke-layer"></div>
                    <div class="mirror-reflection" style="background-image: url('https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/APPLE-BERRY-CAN_ly0oev.png');"></div>
                </div>
                <div class="rating-zone">
                    <div class="stars-display">☆☆☆☆☆</div>
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="total-votes">0 votes</div>
                </div>
            </div>

            <div class="flavor-card" id="blackberry">
                <div class="header-zone">
                    <h2>BLACKBERRY & GRAPE</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/BLACKBERRY-_-GRAPE-CAN_npyf0h.png" alt="Blackberry & Grape" class="can-img">
                    <div class="smoke-layer"></div>
                    <div class="mirror-reflection" style="background-image: url('https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/BLACKBERRY-_-GRAPE-CAN_npyf0h.png');"></div>
                </div>
                <div class="rating-zone">
                    <div class="stars-display">☆☆☆☆☆</div>
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="total-votes">0 votes</div>
                </div>
            </div>

            <div class="flavor-card" id="elderflower">
                <div class="header-zone">
                    <h2>ELDERFLOWER & APPLE</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/ELDERFLOWER-_-APPLE-CAN_afk3hf.png" alt="Elderflower & Apple" class="can-img">
                    <div class="smoke-layer"></div>
                    <div class="mirror-reflection" style="background-image: url('https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/ELDERFLOWER-_-APPLE-CAN_afk3hf.png');"></div>
                </div>
                <div class="rating-zone">
                    <div class="stars-display">☆☆☆☆☆</div>
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="total-votes">0 votes</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
