<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Jaleed Flavor</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <!-- استدعاء مكتبة الأيقونات لظهور شعارات السوشيال ميديا بدقة عالية على الجوال -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- زر تحويل اللغة في أعلى الصفحة -->
    <div class="lang-switch-container">
        <button id="lang-btn" class="lang-btn">English</button>
    </div>

    <div class="mobile-container">
        <header>
            <h1 class="brand-title">JALEED FLAVORS</h1>
            <p class="brand-subtitle" id="text-subtitle">اختر نكهتك المفضلة وقيمها الآن!</p>
        </header>

        <div class="voting-form">
            <!-- النكهة الأولى -->
            <label class="flavor-option">
                <input type="radio" name="flavor" value="raspberry" checked>
                <div class="option-content">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/APPLE-BERRY-CAN_ly0oev.png" alt="Raspberry">
                    <span class="flavor-name" data-ar="التوت العليق والتفاح" data-en="RASPBERRY & APPLE">التوت العليق والتفاح</span>
                </div>
            </label>

            <!-- النكهة الثانية -->
            <label class="flavor-option">
                <input type="radio" name="flavor" value="blackberry">
                <div class="option-content">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/BLACKBERRY-_-GRAPE-CAN_npyf0h.png" alt="Blackberry">
                    <span class="flavor-name" data-ar="التوت الأسود والعنب" data-en="BLACKBERRY & GRAPE">التوت الأسود والعنب</span>
                </div>
            </label>

            <!-- النكهة الثالثة -->
            <label class="flavor-option">
                <input type="radio" name="flavor" value="elderflower">
                <div class="option-content">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/ELDERFLOWER-_-APPLE-CAN_afk3hf.png" alt="Elderflower">
                    <span class="flavor-name" data-ar="زهرة البيلسان والتفاح" data-en="ELDERFLOWER & APPLE">زهرة البيلسان والتفاح</span>
                </div>
            </label>

            <!-- اختيار النجوم -->
            <div class="stars-container">
                <p class="section-title" id="text-stars-title">اضغط للتقييم بالنجوم:</p>
                <div class="star-rating">
                    <span class="star" data-value="5">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="1">★</span>
                </div>
            </div>

            <button id="submit-vote-btn" class="submit-btn">إرسال التقييم </button>
        </div>

        <!-- 📱 فوتر السوشيال ميديا المضاف لصفحة الجوال بروابط قابلة للضغط -->
        <footer class="mobile-footer">
            <span class="social-username">@jaleed.sa</span>
            <div class="social-icons">
                <!-- رابط انستجرام -->
                <a href="https://www.instagram.com/jaleed.sa" target="_blank" rel="noopener noreferrer" class="icon-circle">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <!-- رابط تيك توك -->
                <a href="https://www.tiktok.com/@jaleed.sa" target="_blank" rel="noopener noreferrer" class="icon-circle">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
                <!-- رابط سناب شات -->
                <a href="https://www.snapchat.com/@jaleed.sa" target="_blank" rel="noopener noreferrer" class="icon-circle">
                    <i class="fa-brands fa-snapchat"></i>
                </a>
            </div>
        </footer>
    </div>

    <!-- نافذة نجاح التقييم -->
    <div id="success-popup" class="popup hidden">
        <div class="popup-content">
            <h2 id="popup-title">شكرًا لك! 🧊</h2>
            <p id="popup-desc">تم إرسال تقييمك بنجاح إلى الشاشة الكبيرة.</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
